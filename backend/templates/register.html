<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StatView — Create Account</title>
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
<style>
  .auth-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f3f4f6;
  }

  .auth-card {
    background: white;
    border-radius: 20px;
    padding: 44px 40px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 420px;
  }

  .auth-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }

  .auth-logo {
    height: 40px;
    width: 40px;
    border-radius: 12px;
    background: white;
    display: grid;
    place-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    border: 1px solid #f3f4f6;
  }

  .auth-title   { font-size: 16px; font-weight: 700; color: #111827; }
  .auth-sub     { font-size: 12px; color: #9ca3af; }

  .auth-heading {
    font-size: 24px;
    font-weight: 800;
    color: #111827;
    margin: 0 0 6px 0;
  }

  .auth-desc {
    font-size: 14px;
    color: #6b7280;
    margin: 0 0 28px 0;
  }

  .auth-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
  }

  .auth-label {
    font-size: 12px;
    font-weight: 700;
    color: #374151;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .auth-input {
    background: #f9fafb;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 14px;
    color: #1f2937;
    font-family: "Segoe UI", sans-serif;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
    box-sizing: border-box;
  }

  .auth-input:focus { border-color: #0ea5a4; }

  .auth-btn {
    width: 100%;
    background: linear-gradient(135deg, #0ea5a4, #0891b2);
    border: none;
    color: white;
    font-size: 14px;
    font-weight: 700;
    padding: 13px;
    border-radius: 12px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    margin-top: 8px;
    font-family: "Segoe UI", sans-serif;
  }

  .auth-btn:hover { opacity: 0.9; transform: translateY(-1px); }

  .auth-error {
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #dc2626;
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 13px;
    margin-bottom: 20px;
  }

  .auth-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 13px;
    color: #6b7280;
  }

  .auth-footer a {
    color: #0ea5a4;
    font-weight: 600;
    text-decoration: none;
  }

  .auth-footer a:hover { text-decoration: underline; }

  .auth-hint {
    font-size: 12px;
    color: #9ca3af;
    margin-top: 3px;
  }
</style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">

    <div class="auth-brand">
      <div class="auth-logo">
        <img src="{{ url_for('static', filename='images/logo.png') }}" width="70%">
      </div>
      <div>
        <div class="auth-title">StatView</div>
        <div class="auth-sub">Analytics Dashboard</div>
      </div>
    </div>

    <h1 class="auth-heading">Create your account</h1>
    <p class="auth-desc">Your data stays private and tied to your account.</p>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('register') }}">
      <div class="auth-field">
        <label class="auth-label">Email</label>
        <input class="auth-input" type="email" name="email"
               placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="auth-field">
        <label class="auth-label">Password</label>
        <input class="auth-input" type="password" name="password"
               placeholder="••••••••" required autocomplete="new-password">
        <span class="auth-hint">At least 6 characters</span>
      </div>
      <div class="auth-field">
        <label class="auth-label">Confirm Password</label>
        <input class="auth-input" type="password" name="confirm"
               placeholder="••••••••" required autocomplete="new-password">
      </div>
      <button class="auth-btn" type="submit">Create Account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </div>

  </div>
</div>
</body>
</html>
