<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StatView — Create Account</title>
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">

    <div class="auth-brand">
      <div class="auth-logo">
        <img src="{{ url_for('static', filename='images/logo.png') }}" width="70%">
      </div>
      <div>
        <div class="auth-title">StatView</div>
        <div class="auth-sub">Analytics Dashboard</div>
      </div>
    </div>

    <h1 class="auth-heading">Create your account</h1>
    <p class="auth-desc">Your data stays private and tied to your account.</p>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('register') }}">
      <div class="auth-field">
        <label class="auth-label">Email</label>
        <input class="auth-input" type="email" name="email"
               placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="auth-field">
        <label class="auth-label">Password</label>
        <input class="auth-input" type="password" name="password"
               placeholder="••••••••" required autocomplete="new-password">
        <span class="auth-hint">At least 6 characters</span>
      </div>
      <div class="auth-field">
        <label class="auth-label">Confirm Password</label>
        <input class="auth-input" type="password" name="confirm"
               placeholder="••••••••" required autocomplete="new-password">
      </div>
      <button class="auth-btn" type="submit">Create Account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </div>

  </div>
</div>
</body>
</html>
